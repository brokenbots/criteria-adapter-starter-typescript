name: Publish Adapter

# On every tag push (v*), build the single-binary adapter and publish it as a
# signed OCI artifact via the reusable brokenbots/publish-adapter action
# (with_image: false — see the commented Dockerfile to opt into image publishing).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading v)"
        required: false
        default: "0.0.0-dev"

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build adapter binary
        run: |
          bun install
          bun run build

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish
        uses: brokenbots/publish-adapter@v0
        with:
          sdk: typescript
          binary: ${{ github.workspace }}/out/adapter
          registry: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.ver.outputs.tag }}
          with_image: "false"
